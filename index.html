<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRM Portabilidad</title>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#fff}
header{background:#00a9e0;padding:16px;text-align:center;font-size:24px;font-weight:bold}
.wrap{max-width:1200px;margin:auto;padding:20px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.card,.panel{background:#1e293b;border-radius:10px;padding:15px}
.panel{margin-top:15px}
label{display:block;margin-top:10px}
input{width:100%;padding:10px;border-radius:6px;border:none;margin-top:4px}
button{padding:10px;border:none;border-radius:6px;cursor:pointer}
.save{width:100%;margin-top:15px;background:#00a9e0;color:#fff}
.search{margin-top:15px}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #334155;padding:8px;text-align:center}
.small{padding:5px 8px;margin:2px}
</style>
</head>
<body>
<header>CRM MOVISTAR PORTABILIDAD</header>
<div class="wrap">
<div class="cards">
<div class="card">Clientes<br><h2 id="cTotal">0</h2></div>
<div class="card">SIM<br><h2 id="cSim">0</h2></div>
<div class="card">Activados<br><h2 id="cAct">0</h2></div>
<div class="card">Consumo<br><h2 id="cCon">0</h2></div>
</div>

<div class="panel">
<h2>Registrar cliente</h2>
<label>Nombre</label><input id="nombre">
<label>Cédula</label><input id="cedula">
<label>Fecha de expedición</label><input id="exp" type="date">
<label>Número a portar</label><input id="numero">
<label>NIP</label><input id="nip">
<label>Ciudad</label><input id="ciudad">
<label>Departamento</label><input id="depto">
<label>Fecha estimada de entrega</label><input id="entrega" type="date">
<button class="save" onclick="guardar()">Guardar cliente</button>
</div>

<input id="buscar" class="search" placeholder="Buscar..." oninput="render()">

<div class="panel">
<table>
<thead><tr><th>Nombre</th><th>Cédula</th><th>EXP</th><th>Número</th><th>Entrega</th><th>SIM</th><th>Activación</th><th>Consumo</th><th>Chichón</th><th>Acciones</th></tr></thead>
<tbody id="tb"></tbody>
</table>
</div>
</div>

<script>
let clientes=JSON.parse(localStorage.getItem("crm"))||[];

function persist(){localStorage.setItem("crm",JSON.stringify(clientes));render();}

function guardar(){
const n=nombre.value.trim();
if(!n||!cedula.value||!numero.value){alert("Completa Nombre, Cédula y Número.");return;}
clientes.push({
nombre:n,cedula:cedula.value,exp:exp.value,numero:numero.value,nip:nip.value,
ciudad:ciudad.value,depto:depto.value,entrega:entrega.value,
sim:false,act:false,con:false,chi:false
});
document.querySelectorAll("input").forEach(i=>{if(i.id!="buscar")i.value=""});
persist();
}

function toggle(i,k){clientes[i][k]=!clientes[i][k];persist();}
function del(i){if(confirm("¿Eliminar cliente?")){clientes.splice(i,1);persist();}}

function render(){
let q=buscar.value.toLowerCase();
tb.innerHTML="";
let sim=0,act=0,con=0;
clientes.forEach((c,i)=>{
 if(c.sim)sim++;
 if(c.act)act++;
 if(c.con)con++;
 if((c.nombre+c.cedula+c.numero).toLowerCase().includes(q)){
 tb.innerHTML+=`<tr>
<td>${c.nombre}</td><td>${c.cedula}</td><td>${c.exp||""}</td><td>${c.numero}</td><td>${c.entrega||""}</td>
<td><button class="small" onclick="toggle(${i},'sim')">${c.sim?"✅":"❌"}</button></td>
<td><button class="small" onclick="toggle(${i},'act')">${c.act?"✅":"❌"}</button></td>
<td><button class="small" onclick="toggle(${i},'con')">${c.con?"✅":"❌"}</button></td>
<td><button class="small" onclick="toggle(${i},'chi')">${c.chi?"⚠️":"—"}</button></td>
<td><button class="small" onclick="del(${i})">Eliminar</button></td>
</tr>`;
 }
});
cTotal.textContent=clientes.length;
cSim.textContent=sim;
cAct.textContent=act;
cCon.textContent=con;
}
render();
</script>
</body>
</html>
