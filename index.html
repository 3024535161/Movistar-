<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRM Portabilidad PRO</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
header{background:#00a9e0;padding:15px;text-align:center;font-size:24px;font-weight:bold}
.wrap{max-width:1200px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.card,.panel{background:#1e293b;border-radius:10px;padding:15px}
label{display:block;margin-top:10px}
input,textarea,select{width:100%;padding:10px;border-radius:6px;border:none;margin-top:4px}
button{padding:10px;border:none;border-radius:6px;cursor:pointer}
.primary{width:100%;margin-top:15px;background:#00a9e0;color:#fff}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #334155;padding:8px;text-align:center}
a{color:#6ee7b7;text-decoration:none;font-weight:bold}
.small{padding:5px 8px}

.sidepanel{position:fixed;top:0;right:-420px;width:400px;height:100%;background:#111827;color:#fff;padding:20px;overflow:auto;transition:.3s;box-shadow:-4px 0 10px rgba(0,0,0,.4)}
.sidepanel.open{right:0}
.sidepanel h2{margin-top:0}
.closebtn{float:right;background:#ef4444;color:#fff}
.info{margin:8px 0;padding:8px;background:#1f2937;border-radius:6px}

</style>
</head>
<body>
<header>CRM MOVISTAR PORTABILIDAD PRO</header>
<div class="wrap">
<div class="grid">
<div class="card"><h3>Total</h3><h2 id="t">0</h2></div>
<div class="card"><h3>SIM</h3><h2 id="s">0</h2></div>
<div class="card"><h3>Activados</h3><h2 id="a">0</h2></div>
<div class="card"><h3>Consumo</h3><h2 id="c">0</h2></div>
</div>

<div class="panel">
<h2>Nuevo cliente</h2>
<label>Nombre</label><input id="nombre">
<label>Cédula</label><input id="cedula">
<label>Fecha de expedición</label><input id="exp" type="date">
<label>Número a portar</label><input id="numero">
<label>NIP</label><input id="nip">
<label>Ciudad</label><input id="ciudad">
<label>Departamento</label><input id="depto">
<label>Dirección</label><input id="dir">
<label>Barrio</label><input id="barrio">
<label>Operador</label>
<select id="operador"><option>Claro</option><option>Tigo</option><option>WOM</option><option>ETB</option><option>Virgin</option></select>
<label>Fecha estimada de entrega</label><input id="entrega" type="date">
<button class="primary" onclick="guardar()">Guardar cliente</button>
</div>

<input id="buscar" placeholder="Buscar..." style="width:100%;padding:10px;margin-top:20px" oninput="render()">

<div class="panel">
<table>
<thead><tr>
<th>Nombre</th><th>Cédula</th><th>WhatsApp</th><th>EXP</th><th>Ciudad</th><th>Entrega</th><th>Consumo</th><th>Chichón</th><th>Acciones</th>
</tr></thead>
<tbody id="tb"></tbody>
</table>
</div>
</div>


<div id="panelCliente" class="sidepanel">
<button class="closebtn" onclick="cerrarPanel()">Cerrar</button>
<h2>Ficha del cliente</h2>
<div id="detalleCliente"></div>
</div>

<script>
let db=JSON.parse(localStorage.getItem("crmpro"))||[];

function saveDB(){
localStorage.setItem("crmpro",JSON.stringify(db));
render();
}

function verCliente(i){
 const x=db[i];
 detalleCliente.innerHTML=`
 <div class='info'><b>Nombre:</b> ${x.nombre}</div>
 <div class='info'><b>Cédula:</b> ${x.cedula}</div>
 <div class='info'><b>WhatsApp:</b> <a target="_blank" href="https://wa.me/57${x.numero}">${x.numero}</a></div>
 <div class='info'><b>EXP:</b> ${x.exp||''}</div>
 <div class='info'><b>Ciudad:</b> ${x.ciudad}</div>
 <div class='info'><b>Departamento:</b> ${x.depto||''}</div>
 <div class='info'><b>Dirección:</b> ${x.dir||''}</div>
 <div class='info'><b>Barrio:</b> ${x.barrio||''}</div>
 <div class='info'><b>Operador:</b> ${x.operador||''}</div>
 <div class='info'><b>NIP:</b> ${x.nip||''}</div>
 <div class='info'><b>Entrega:</b> ${x.entrega||''}</div>
 <button onclick="edit(${i})">✏️ Editar</button>
 <button onclick="abrirWhatsApp('${x.numero}','Hola ${x.nombre}')">💬 WhatsApp</button>`;
 panelCliente.classList.add('open');
}
function cerrarPanel(){panelCliente.classList.remove('open');}

render();}

function guardar(){
if(!nombre.value||!cedula.value||!numero.value){alert("Completa Nombre, Cédula y Número");return;}
db.push({
nombre:nombre.value,cedula:cedula.value,exp:exp.value,numero:numero.value,
nip:nip.value,ciudad:ciudad.value,depto:depto.value,dir:dir.value,barrio:barrio.value,
operador:operador.value,entrega:entrega.value,
sim:false,act:false,con:false,chi:false
});
document.querySelectorAll("input,textarea").forEach(e=>{if(e.id!=="buscar")e.value=""});
saveDB();
}

function tg(i,k){db[i][k]=!db[i][k];saveDB();}
function del(i){if(confirm("Eliminar cliente?")){db.splice(i,1);saveDB();}}
function edit(i){
let c=db[i];
nombre.value=c.nombre;cedula.value=c.cedula;exp.value=c.exp;numero.value=c.numero;
nip.value=c.nip;ciudad.value=c.ciudad;depto.value=c.depto;dir.value=c.dir;
barrio.value=c.barrio;operador.value=c.operador;entrega.value=c.entrega;
db.splice(i,1);saveDB();
}
function render(){
let q=buscar.value.toLowerCase(),sim=0,act=0,con=0;
tb.innerHTML="";
db.forEach((x,i)=>{
if(x.sim)sim++; if(x.act)act++; if(x.con)con++;
if((x.nombre+x.numero+x.cedula).toLowerCase().includes(q)){
tb.innerHTML+=`<tr>
<td><a href='#' onclick='verCliente(${i});return false;'>${x.nombre}</a></td>
<td>${x.cedula}</td>
<td><a target="_blank" href="https://wa.me/57${x.numero}?text=Hola%20${encodeURIComponent(x.nombre)},%20te%20contacto%20por%20tu%20portabilidad.">${x.numero}</a></td>
<td>${x.exp||""}</td>
<td>${x.ciudad}</td>
<td>${x.entrega||""}</td>
<td><button class="small" onclick="tg(${i},'con')">${x.con?"✅":"❌"}</button></td>
<td><button class="small" onclick="tg(${i},'chi')">${x.chi?"⚠️":"—"}</button></td>
<td><button onclick="edit(${i})">Editar</button> <button onclick="del(${i})">Eliminar</button></td>
</tr>`;
}});
t.textContent=db.length;s.textContent=sim;a.textContent=act;c.textContent=con;
}
render();
</script>
</body>
</html>
