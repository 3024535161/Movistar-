
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRM Movistar - Demo</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0}
header{background:#00a9e0;padding:18px;text-align:center}
.wrap{max-width:1100px;margin:auto;padding:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.card{background:#1e293b;padding:16px;border-radius:10px;text-align:center}
form{background:#1e293b;padding:20px;border-radius:10px}
label{display:block;margin-top:12px;font-weight:bold}
input{width:100%;padding:10px;border-radius:6px;border:none;margin-top:5px}
button{margin-top:18px;padding:12px;width:100%;background:#00a9e0;border:none;border-radius:8px;font-weight:bold}
table{width:100%;margin-top:25px;border-collapse:collapse;background:#1e293b}
th,td{border:1px solid #334155;padding:10px;text-align:center}
.actions button{width:auto;margin:2px;padding:6px 10px}
.search{margin-top:20px;width:100%;padding:10px;border-radius:6px;border:none}
</style>
</head>
<body>
<header><h1>CRM Portabilidad Movistar</h1></header>
<div class="wrap">
<div class="cards">
<div class="card"><h3>Clientes</h3><p>0</p></div>
<div class="card"><h3>Pendientes</h3><p>0</p></div>
<div class="card"><h3>Activados</h3><p>0</p></div>
<div class="card"><h3>Consumo</h3><p>0</p></div>
</div>

<form>
<label>Nombre del cliente</label>
<input>

<label>Cédula</label>
<input>

<label>Fecha de expedición (EXP)</label>
<input type="date">

<label>Número a portar</label>
<input>

<label>NIP</label>
<input>

<label>Ciudad</label>
<input>

<label>Departamento</label>
<input>

<label>Fecha estimada de entrega</label>
<input type="date">

<button type="button">Guardar cliente</button>
</form>

<input class="search" placeholder="Buscar cliente...">

<table>
<thead>
<tr>
<th>Cliente</th><th>Cédula</th><th>EXP</th><th>Número</th><th>Entrega</th>
<th>SIM</th><th>Activación</th><th>Consumo</th><th>Chichón</th><th>Acciones</th>
</tr>
</thead>
<tbody>
<tr>
<td>Ejemplo</td>
<td>12345678</td>
<td>2026-01-01</td>
<td>3001234567</td>
<td>2026-01-05</td>
<td><button>Registrar</button></td>
<td><button>Registrar</button></td>
<td><button>Marcar</button></td>
<td><button>Marcar</button></td>
<td class="actions"><button>Editar</button><button>Eliminar</button></td>
</tr>
</tbody>
</table>
</div>
</body>
</html>
